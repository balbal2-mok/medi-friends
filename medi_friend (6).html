<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메디프렌즈 · 여고생 약 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --peach: #ffd6c2;
    --coral: #ff8a7a;
    --rose: #f4a8b5;
    --mint: #b8e6d4;
    --sage: #8ec5a8;
    --lilac: #d4c1ed;
    --lavender: #a89cc9;
    --butter: #ffe9a8;
    --ink: #3a2e2a;
    --soft-ink: #6b5851;
    --pill-shadow: 0 6px 0 rgba(58, 46, 42, 0.12), 0 12px 24px rgba(58, 46, 42, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Gowun Dodum', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255, 214, 194, 0.4) 0%, transparent 25%),
      radial-gradient(circle at 85% 70%, rgba(212, 193, 237, 0.35) 0%, transparent 25%),
      radial-gradient(circle at 50% 90%, rgba(184, 230, 212, 0.3) 0%, transparent 20%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(58, 46, 42, 0.04) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 24px 0 40px;
    position: relative;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: white;
    padding: 10px 22px;
    border-radius: 999px;
    box-shadow: var(--pill-shadow);
    margin-bottom: 20px;
    transform: rotate(-2deg);
  }

  .logo-mark .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--coral), var(--rose));
  }

  .logo-mark span {
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.5px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(38px, 7vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 14px;
  }

  h1 .accent {
    font-style: italic;
    font-weight: 400;
    color: var(--coral);
    position: relative;
  }

  h1 .accent::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    height: 8px;
    background: var(--butter);
    z-index: -1;
    border-radius: 4px;
  }

  .subtitle {
    font-size: 17px;
    color: var(--soft-ink);
    max-width: 540px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Disclaimer banner */
  .disclaimer {
    margin: 32px auto;
    max-width: 720px;
    background: white;
    border: 2px dashed var(--rose);
    border-radius: 20px;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
    color: var(--soft-ink);
    line-height: 1.5;
  }

  .disclaimer .icon {
    font-size: 24px;
    flex-shrink: 0;
  }

  /* Symptom selector */
  .symptom-section {
    margin-top: 40px;
  }

  .section-label {
    font-family: 'Gaegu', cursive;
    font-size: 16px;
    color: var(--coral);
    margin-bottom: 12px;
    display: inline-block;
    padding: 4px 14px;
    background: white;
    border-radius: 999px;
    box-shadow: var(--pill-shadow);
  }

  h2 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  .symptom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 48px;
  }

  .symptom-btn {
    background: white;
    border: none;
    border-radius: 22px;
    padding: 22px 16px;
    cursor: pointer;
    box-shadow: var(--pill-shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .symptom-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gradient-from, var(--peach)), var(--gradient-to, var(--rose)));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .symptom-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 0 rgba(58, 46, 42, 0.1), 0 18px 30px rgba(58, 46, 42, 0.1);
  }

  .symptom-btn.active {
    transform: translateY(-3px);
  }

  .symptom-btn.active::before {
    opacity: 1;
  }

  .symptom-btn .emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .symptom-btn .name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }

  .symptom-btn.active .name {
    color: white;
  }

  /* Content panel */
  .content-panel {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  .content-panel.active {
    display: block;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    background: white;
    border-radius: 28px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--pill-shadow);
    border-left: 8px solid var(--coral);
  }

  .panel-header h3 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .panel-header p {
    color: var(--soft-ink);
    line-height: 1.6;
  }

  /* Medicine cards */
  .meds-section, .vitamin-section {
    margin-bottom: 40px;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .badge {
    background: var(--butter);
    color: var(--ink);
    font-family: 'Gaegu', cursive;
    font-size: 14px;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 700;
  }

  .meds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
  }

  .med-card {
    background: white;
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--pill-shadow);
    position: relative;
    transition: transform 0.2s;
  }

  .med-card:hover {
    transform: translateY(-2px);
  }

  .med-card .pill-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 24px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--pill-c1, var(--peach)) 50%, var(--pill-c2, var(--rose)) 50%);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08);
  }

  .med-card h4 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    margin-bottom: 4px;
    padding-right: 60px;
  }

  .med-card .ingredient {
    font-size: 12px;
    color: var(--soft-ink);
    margin-bottom: 14px;
    font-family: 'Gaegu', cursive;
  }

  .med-info {
    font-size: 14px;
    line-height: 1.6;
    color: var(--soft-ink);
  }

  .med-info dt {
    font-weight: 700;
    color: var(--ink);
    margin-top: 10px;
    font-size: 13px;
  }

  .med-info dt:first-child {
    margin-top: 0;
  }

  .cautions-list {
    list-style: none;
    padding: 0;
    margin: 6px 0 0 0;
  }

  .cautions-list li {
    padding: 8px 10px;
    margin-bottom: 6px;
    background: #faf6f3;
    border-radius: 10px;
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--soft-ink);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    border-left: 3px solid #ffb39a;
  }

  .cautions-list li:last-child { margin-bottom: 0; }

  .cautions-list li.ix-danger { border-left-color: #c63d4d; background: #fff5f6; }
  .cautions-list li.ix-warn { border-left-color: #e08a3c; background: #fff8f0; }
  .cautions-list li.ix-time { border-left-color: #5a9fc4; background: #f3f9fd; }
  .cautions-list li.ix-food { border-left-color: #9c7bb5; background: #faf6fd; }
  .cautions-list li.ix-tip { border-left-color: #5fa888; background: #f3faf6; }

  .cautions-list .ix-tag {
    flex-shrink: 0;
    font-family: 'Gaegu', cursive;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    white-space: nowrap;
    margin-top: 1px;
    line-height: 1.4;
  }

  .cautions-list .ix-text { flex: 1; }
  .cautions-list li strong { color: var(--ink); font-weight: 700; }

  .warning-tag {
    display: inline-block;
    background: #ffe4e1;
    color: #c63d4d;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 12px;
    font-family: 'Gaegu', cursive;
  }

  /* Vitamin cards */
  .vitamin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }

  .vitamin-card {
    background: linear-gradient(135deg, var(--vg1, var(--mint)) 0%, var(--vg2, var(--sage)) 100%);
    border-radius: 22px;
    padding: 22px;
    color: var(--ink);
    box-shadow: var(--pill-shadow);
    position: relative;
    overflow: hidden;
  }

  .vitamin-card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
  }

  .vitamin-card .vit-emoji {
    font-size: 30px;
    margin-bottom: 8px;
    position: relative;
  }

  .vitamin-card h5 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    margin-bottom: 6px;
    position: relative;
  }

  .vitamin-card .why {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 8px;
    position: relative;
  }

  .vitamin-card .sources {
    font-size: 12px;
    font-family: 'Gaegu', cursive;
    background: rgba(255,255,255,0.5);
    padding: 6px 10px;
    border-radius: 10px;
    display: inline-block;
    position: relative;
  }

  /* Share footer */
  .share-section {
    margin-top: 60px;
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-radius: 32px;
    box-shadow: var(--pill-shadow);
  }

  .share-section h3 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    margin-bottom: 8px;
  }

  .share-section p {
    color: var(--soft-ink);
    margin-bottom: 20px;
  }

  .share-btn {
    background: var(--coral);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 999px;
    font-family: 'Gaegu', cursive;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 0 #c66459;
    transition: all 0.15s;
  }

  .share-btn:hover {
    transform: translateY(2px);
    box-shadow: 0 4px 0 #c66459;
  }

  .share-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #c66459;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    color: var(--soft-ink);
    font-size: 13px;
    font-family: 'Gaegu', cursive;
  }

  footer .heart { color: var(--coral); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--soft-ink);
  }

  .empty-state .big-emoji {
    font-size: 60px;
    margin-bottom: 16px;
    display: block;
  }

  .empty-state p {
    font-family: 'Gaegu', cursive;
    font-size: 18px;
  }

  /* Safety section */
  .safety-section {
    margin: 48px 0;
    padding: 32px 28px;
    background: linear-gradient(135deg, #fff5f3 0%, #fff9ed 100%);
    border-radius: 32px;
    border: 2px solid #ffd6c2;
    position: relative;
    overflow: hidden;
  }

  .safety-section::before {
    content: '⚕';
    position: absolute;
    top: -20px;
    right: -10px;
    font-size: 200px;
    color: rgba(255, 138, 122, 0.06);
    font-family: serif;
    pointer-events: none;
  }

  .safety-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    position: relative;
  }

  .safety-card {
    background: white;
    border-radius: 20px;
    padding: 22px 20px 20px;
    box-shadow: var(--pill-shadow);
    position: relative;
    border-top: 6px solid;
    transition: transform 0.2s;
  }

  .safety-card:hover {
    transform: translateY(-3px);
  }

  .safety-card.danger { border-top-color: #c63d4d; }
  .safety-card.warn { border-top-color: #e08a3c; }
  .safety-card.info { border-top-color: #5a9fc4; }

  .safety-card .safety-num {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--soft-ink);
    opacity: 0.5;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .safety-card h4 {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .safety-card.danger h4 { color: #c63d4d; }
  .safety-card.warn h4 { color: #b86a2c; }
  .safety-card.info h4 { color: #3a7da0; }

  .safety-card p {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--soft-ink);
  }

  .safety-card .hl {
    background: var(--butter);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--ink);
    font-weight: 600;
  }

  /* Per-symptom interaction warning box */
  .interaction-box {
    margin-top: 20px;
    background: #fff5f3;
    border: 2px solid #ffb39a;
    border-radius: 22px;
    padding: 22px 24px;
    position: relative;
  }

  .interaction-box::before {
    content: '⚠';
    position: absolute;
    top: -14px;
    left: 22px;
    background: #ff8a7a;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
  }

  .interaction-box h5 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: #c63d4d;
    margin: 4px 0 14px 36px;
  }

  .interaction-box ul {
    list-style: none;
    padding: 0;
  }

  .interaction-box li {
    padding: 12px 14px 12px 14px;
    margin-bottom: 8px;
    background: white;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--soft-ink);
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-left: 4px solid #ffb39a;
  }

  .interaction-box li.ix-danger { border-left-color: #c63d4d; background: #fff5f6; }
  .interaction-box li.ix-warn { border-left-color: #e08a3c; background: #fff8f0; }
  .interaction-box li.ix-time { border-left-color: #5a9fc4; background: #f3f9fd; }
  .interaction-box li.ix-food { border-left-color: #9c7bb5; background: #faf6fd; }
  .interaction-box li.ix-tip { border-left-color: #5fa888; background: #f3faf6; }

  .ix-tag {
    flex-shrink: 0;
    font-family: 'Gaegu', cursive;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
    margin-top: 1px;
  }

  .tag-danger { background: #ffe0e3; color: #c63d4d; }
  .tag-warn { background: #ffeed6; color: #b86a2c; }
  .tag-time { background: #d9ecf7; color: #3a7da0; }
  .tag-food { background: #ebe0f5; color: #6b4a8a; }
  .tag-tip { background: #d9f0e3; color: #3d7a5a; }

  .ix-text {
    flex: 1;
  }

  .interaction-box li strong {
    color: var(--ink);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-mark">
      <div class="dot"></div>
      <span>MEDI · FRIENDS</span>
    </div>
    <h1>우리끼리<br>알아두는 <span class="accent">약 가이드</span></h1>
    <p class="subtitle">생리통, 두통, 감기… 자주 먹는 약 제대로 알고 먹자!<br>증상별 비타민 추천까지 한눈에 ✦</p>
  </header>

  <div class="disclaimer">
    <span class="icon">💌</span>
    <span><strong>꼭 읽어줘!</strong> 이 정보는 일반적인 안내야. 증상이 심하거나 지속되면 꼭 약사·의사 선생님과 상담하기! 약 알레르기나 지병이 있으면 더더욱 ✿</span>
  </div>

  <section class="symptom-section">
    <span class="section-label">STEP 01</span>
    <h2>오늘 어디가 불편해?</h2>
    <div class="symptom-grid" id="symptomGrid"></div>
  </section>

  <div id="emptyState" class="empty-state">
    <span class="big-emoji">🌷</span>
    <p>증상을 골라봐!</p>
  </div>

  <div id="contentArea"></div>

  <div class="share-section">
    <h3>친구한테도 알려주기 🌸</h3>
    <p>이 가이드를 친구들과 공유해보자!</p>
    <button class="share-btn" onclick="shareApp()">📋 링크 복사하기</button>
  </div>

  <footer>
    <p>made with <span class="heart">♥</span> for my friends</p>
  </footer>
</div>

<script>
const data = {
  period: {
    name: '생리통',
    emoji: '🌷',
    gradient: ['#ffb3ba', '#ff8a7a'],
    description: '생리통은 자궁이 수축하면서 생기는 통증이야. 진통제는 통증이 시작되자마자 먹는 게 가장 효과적이래!',
    meds: [
      {
        name: '이지엔6 프로',
        ingredient: '덱시부프로펜 300mg',
        pillColor: ['#ffd6c2', '#ff8a7a'],
        usage: '식후 30분, 1정씩 (8시간 간격)',
        feature: '일반 이부프로펜보다 위에 덜 부담돼서 공복에 비교적 안전. 효과 빠른 편!',
        cautions: [
          { tag: 'danger', text: '<strong>탁센·이부프로펜·아스피린과 동시 X</strong> — 같은 NSAIDs 계열, 위출혈·신장 손상 위험' },
          { tag: 'food', text: '<strong>식후 30분 복용</strong> — 위장 자극 줄이기' },
          { tag: 'food', text: '<strong>술과 함께 X</strong> — 위출혈 위험 폭증' },
          { tag: 'tip', text: '<strong>통증 시작될 때 바로 ◎</strong> — 참다가 먹으면 효과 ↓' }
        ]
      },
      {
        name: '탁센레이디',
        ingredient: '나프록센 250mg',

const symptomGrid = document.getElementById('symptomGrid');
const contentArea = document.getElementById('contentArea');
const emptyState = document.getElementById('emptyState');

function tagLabel(tag) {
  return {
    danger: '🚫 금지',
    warn: '⚠️ 주의',
    time: '⏱ 간격',
    food: '🍽 음식',
    tip: '💡 TIP'
  }[tag] || '⚠️';
}

// Build symptom buttons
Object.entries(data).forEach(([key, info]) => {
  const btn = document.createElement('button');
  btn.className = 'symptom-btn';
  btn.dataset.key = key;
  btn.style.setProperty('--gradient-from', info.gradient[0]);
  btn.style.setProperty('--gradient-to', info.gradient[1]);
  btn.innerHTML = `
    <span class="emoji">${info.emoji}</span>
    <span class="name">${info.name}</span>
  `;
  btn.addEventListener('click', () => selectSymptom(key));
  symptomGrid.appendChild(btn);
});

function selectSymptom(key) {
  const info = data[key];
  document.querySelectorAll('.symptom-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });
  emptyState.style.display = 'none';

  contentArea.innerHTML = `
    <div class="content-panel active">
      <div class="panel-header" style="border-left-color: ${info.gradient[1]}">
        <h3>${info.emoji} ${info.name}</h3>
        <p>${info.description}</p>
      </div>

      <section class="meds-section">
        <h4 class="section-title">💊 자주 먹는 약 <span class="badge">${info.meds.length}종</span></h4>
        <div class="meds-grid">
          ${info.meds.map(m => `
            <div class="med-card">
              <div class="pill-icon" style="--pill-c1:${m.pillColor[0]}; --pill-c2:${m.pillColor[1]}"></div>
              <h4>${m.name}</h4>
              <div class="ingredient">${m.ingredient}</div>
              <dl class="med-info">
                <dt>💊 복용법</dt>
                <dd>${m.usage}</dd>
                <dt>✨ 특징</dt>
                <dd>${m.feature}</dd>
                <dt>⚠️ 유의점</dt>
                <dd>
                  <ul class="cautions-list">
                    ${m.cautions.map(c => `
                      <li class="ix-${c.tag}">
                        <span class="ix-tag tag-${c.tag}">${tagLabel(c.tag)}</span>
                        <span class="ix-text">${c.text}</span>
                      </li>
                    `).join('')}
                  </ul>
                </dd>
              </dl>
            </div>
          `).join('')}
        </div>
      </section>

      <section class="vitamin-section">
        <h4 class="section-title">🌱 추천 비타민·영양제 <span class="badge">${info.vitamins.length}가지</span></h4>
        <div class="vitamin-grid">
          ${info.vitamins.map(v => `
            <div class="vitamin-card" style="--vg1:${v.g[0]}; --vg2:${v.g[1]}">
              <div class="vit-emoji">${v.emoji}</div>
              <h5>${v.name}</h5>
              <p class="why">${v.why}</p>
              <div class="sources">📍 ${v.sources}</div>
            </div>
          `).join('')}
        </div>
      </section>
    </div>
  `;

  contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function shareApp() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      alert('링크가 복사됐어! 친구한테 보내주기 💕');
    }).catch(() => {
      alert('이 페이지 주소를 친구한테 공유해줘 💕');
    });
  } else {
    alert('이 페이지 주소를 친구한테 공유해줘 💕');
  }
}
